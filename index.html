<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzas Yenny - Panel Principal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 lg:py-0">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-4 lg:h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">Finanzas Yenny</span>
                </div>
                <div class="flex flex-wrap justify-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full lg:w-auto">
                    <a href="index.html" class="bg-blue-700 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-chart-line mr-1"></i> Dashboard</a>
                    <a href="clientes.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-users mr-1"></i> Clientes</a>
                    <a href="prestamos.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Préstamos</a>
                    <a href="pagos.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-cash-register mr-1"></i> Pagos</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="mb-6 text-center sm:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Panel de Control</h1>
            <p class="text-sm text-gray-600">Resumen financiero, control de ganancias en intereses y alertas de mora.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Capital en la Calle</p>
                    <h3 id="txt-capital-calle" class="text-xl sm:text-2xl font-black text-gray-800 mt-1">$0</h3>
                </div>
                <div class="p-3 bg-blue-50 rounded-lg text-blue-600"><i class="fa-solid fa-hand-holding-dollar text-xl sm:text-2xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Intereses / Ganancia Mes</p>
                    <h3 id="txt-ganancia-mes" class="text-xl sm:text-2xl font-black text-green-600 mt-1">$0</h3>
                </div>
                <div class="p-3 bg-green-50 rounded-lg text-green-600"><i class="fa-solid fa-chart-line text-xl sm:text-2xl"></i></div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Clientes en Mora</p>
                    <h3 id="txt-clientes-mora" class="text-xl sm:text-2xl font-black text-red-600 mt-1">0</h3>
                </div>
                <div class="p-3 bg-red-50 rounded-lg text-red-600"><i class="fa-solid fa-bell text-xl sm:text-2xl"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h2 class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-chart-bar text-blue-500 mr-2"></i>Historial de Recaudo Mensual</h2>
                <div class="relative flex-1 min-h-[250px] sm:min-h-[300px]">
                    <canvas id="chartRecaudo"></canvas>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 mb-3 text-red-600"><i class="fa-solid fa-triangle-exclamation mr-2"></i>Alertas Urgentes</h2>
                <div class="space-y-3 overflow-y-auto max-h-[320px] pr-1" id="lista-alertas">
                    <p class="text-gray-500 text-sm italic text-center py-4">Cargando alertas de cobro...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
