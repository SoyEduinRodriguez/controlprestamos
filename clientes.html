<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 lg:py-0">
        <div class="flex flex-col lg:flex-row items-center justify-between gap-4 lg:h-16">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-wallet text-2xl"></i>
                <span class="font-bold text-xl tracking-wide">Finanzas Yenny</span>
            </div>
            <div class="flex flex-wrap justify-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full lg:w-auto">
                <a href="index.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-chart-line mr-1"></i> Dashboard</a>
                <a href="clientes.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-users mr-1"></i> Clientes</a>
                <a href="prestamos.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Préstamos</a>
                <a href="pagos.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-cash-register mr-1"></i> Pagos</a>
                <a href="simulador.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-calculator mr-1"></i> Simulador</a>
            </div>
        </div>
    </div>
</nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="mb-6 text-center sm:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Administración de Clientes</h1>
            <p class="text-sm text-gray-600">Registra nuevos deudores o gestiona los contactos existentes.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-lg font-bold text-gray-800 mb-3"><i class="fa-solid fa-user-plus text-blue-500 mr-2"></i>Nuevo Cliente</h2>
                <form id="form-cliente" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ej. Juan Pérez">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono / WhatsApp</label>
                        <input type="text" id="telefono" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ej. 3123456789">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 text-sm shadow-xs">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> Guardar Cliente
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-5 rounded-xl shadow-sm border
