<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos - Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">Finanzas Mamá</span>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-chart-line mr-1"></i> Dashboard</a>
                    <a href="clientes.html" class="bg-blue-700 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-users mr-1"></i> Clientes</a>
                    <a href="prestamos.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Préstamos</a>
                    <a href="pagos.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-cash-register mr-1"></i> Registrar Pago</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Administración de Clientes</h1>
            <p class="text-gray-600">Registra nuevos deudores o gestiona los contactos existentes.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-user-plus text-blue-500 mr-2"></i>Nuevo Cliente</h2>
                
                <form id="form-cliente" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Juan Pérez">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono / WhatsApp</label>
                        <input type="text" id="telefono" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 3123456789">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition duration-200">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> Guardar Cliente
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-address-book text-blue-500 mr-2"></i>Clientes Registrados</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold text-sm">
                                <th class="p-3">ID</th>
                                <th class="p-3">Nombre</th>
                                <th class="p-3">Teléfono</th>
                                <th class="p-3">Fecha Registro</th>
                                <th class="p-3 text-center">Acciones</th> </tr>
                            </tr>
                        </thead>
                        <tbody id="tabla-clientes" class="text-gray-700 text-sm divide-y divide-gray-100">
                            <tr>
                                <td colspan="4" class="p-4 text-center text-gray-500 italic">Cargando clientes de Supabase...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
