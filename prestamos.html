<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Préstamos - Préstamos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 lg:py-0">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-4 lg:h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">Finanzas Yenny</span>
                </div>
                <div class="flex flex-wrap justify-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium w-full lg:w-auto">
                    <a href="index.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-chart-line mr-1"></i> Dashboard</a>
                    <a href="clientes.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-users mr-1"></i> Clientes</a>
                    <a href="prestamos.html" class="bg-blue-700 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Préstamos</a>
                    <a href="pagos.html" class="hover:bg-blue-500 px-2.5 py-2 rounded-md transition-colors"><i class="fa-solid fa-cash-register mr-1"></i> Pagos</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="mb-6 text-center sm:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Gestión de Préstamos</h1>
            <p class="text-sm text-gray-600">Crea nuevos créditos y visualiza los planes de pago activos.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-lg font-bold text-gray-800 mb-3"><i class="fa-solid fa-file-invoice-dollar text-blue-500 mr-2"></i>Nuevo Préstamo</h2>
                <form id="form-prestamo" class="space-y-3">
                    <div>
                        <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Seleccionar Cliente</label>
                        <select id="select-cliente" required class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500">
                            <option value="">Cargando clientes...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Monto Prestado ($)</label>
                        <input type="number" id="monto" required min="1000" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Ej. 1000000">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Nº Cuotas</label>
                            <input type="number" id="cuotas-cant" required min="1" max="36" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Ej. 5">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Día Cobro</label>
                            <input type="number" id="dia-pago" required min="1" max="31" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Ej. 5">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Valor Cuota Fija ($)</label>
                        <input type="number" id="valor-cuota" required min="100" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Ej. 230000">
                    </div>
                    <div>
                        <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Fecha de Desembolso / Inicio</label>
                        <input type="date" id="fecha-inicio" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 text-sm shadow-xs mt-2">
                        <i class="fa-solid fa-hand-holding-dollar mr-1"></i> Desembolsar Crédito
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-800 mb-3"><i class="fa-solid fa-folder-open text-blue-500 mr-2"></i>Créditos en Curso</h2>
                
                <div class="space-y-3" id="lista-prestamos">
                    <p class="text-gray-500 text-sm italic">Cargando préstamos de Supabase...</p>
                </div>

                <div class="mt-6 pt-6 border-t border-gray-200">
                    <h2 class="text-lg font-bold text-gray-500 mb-3"><i class="fa-solid fa-folder-closed text-gray-400 mr-2"></i>Créditos Finalizados (Historial)</h2>
                    <div class="space-y-3 opacity-75" id="lista-prestamos-finalizados">
                        <p class="text-gray-400 text-sm italic">No hay créditos finalizados todavía.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/prestamos.js"></script>
</body>
</html>
