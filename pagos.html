<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Préstamos - Registrar Pagos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-2xl"></i>
                    <span class="font-bold text-xl tracking-wide">Finanzas Mamá</span>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-chart-line mr-1"></i> Dashboard</a>
                    <a href="clientes.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-users mr-1"></i> Clientes</a>
                    <a href="prestamos.html" class="hover:bg-blue-500 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-hand-holding-dollar mr-1"></i> Préstamos</a>
                    <a href="pagos.html" class="bg-blue-700 px-3 py-2 rounded-md text-sm font-medium"><i class="fa-solid fa-cash-register mr-1"></i> Registrar Pago</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Registro de Recaudo</h1>
            <p class="text-gray-600">Busca los créditos de los clientes y procesa pagos completos o abonos parciales.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-calculator text-blue-500 mr-2"></i>Recibir Dinero</h2>
                
                <form id="form-pago" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Seleccionar Crédito Activo</label>
                        <select id="select-prestamo" required class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Cargando créditos...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Seleccionar Cuota a Pagar</label>
                        <select id="select-cuota" required disabled class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Primero elija un crédito...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Monto Recibido ($)</label>
                        <input type="number" id="monto-recibido" required min="100" disabled class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. 150000">
                        <p id="txt-ayuda-cuota" class="text-xs text-blue-600 mt-1 font-medium hidden"></p>
                    </div>
                    <button type="submit" id="btn-guardar-pago" disabled class="w-full bg-gray-400 text-white font-medium py-2 rounded-lg cursor-not-allowed transition duration-200">
                        <i class="fa-solid fa-receipt mr-1"></i> Procesar Transacción
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-calendar-days text-blue-500 mr-2"></i>Estado del Plan de Pagos</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold text-sm">
                                <th class="p-3">Nº Cuota</th>
                                <th class="p-3">Vencimiento</th>
                                <th class="p-3">Valor Fijo</th>
                                <th class="p-3">Abonado</th>
                                <th class="p-3">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-estado-cuotas" class="text-gray-700 text-sm divide-y divide-gray-100">
                            <tr>
                                <td colspan="5" class="p-4 text-center text-gray-500 italic">Selecciona un crédito para auditar sus cuotas.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/pagos.js"></script>
</body>
</html>
